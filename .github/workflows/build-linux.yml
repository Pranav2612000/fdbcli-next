name: Build Linux Executable

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
    - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
        contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install FoundationDB Client
        run: |
          wget https://github.com/apple/foundationdb/releases/download/7.3.43/foundationdb-clients_7.3.43-1_amd64.deb
          sudo dpkg -i foundationdb-clients_7.3.43-1_amd64.deb

      - name: Build release binary
        run: cargo build --release --bin fdbcli-next

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: fdbcli-next-linux-x86_64
          path: target/release/fdbcli-next

          if-no-files-found: error

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/fdbcli-next
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

